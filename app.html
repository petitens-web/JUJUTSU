<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJK: MAJESTIC VISUALIZER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

        #ui {
            position: fixed; top: 0; width: 100%;
            text-align: center; color: #fff;
            z-index: 10; pointer-events: none;
            padding: 14px 0 10px;
        }

        h1 {
            font-size: clamp(1.6rem, 5vw, 3rem);
            letter-spacing: 10px; font-weight: 900;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        #technique-name {
            font-size: clamp(0.85rem, 2.5vw, 1.15rem);
            color: #00ffff; margin: 5px 0 0;
            font-weight: bold; letter-spacing: 5px; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,255,255,0.8), 0 0 40px rgba(0,255,255,0.4);
            transition: color 0.4s, text-shadow 0.4s;
        }

        #instructions {
            margin-top: 8px; display: flex;
            flex-direction: column; align-items: center; gap: 3px;
        }

        .instruction {
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5);
            padding: 4px 14px; border-left: 3px solid #333;
            font-size: 0.72rem; letter-spacing: 1px; transition: all 0.3s;
        }

        .instruction.active-technique {
            border-left-color: #fff; color: #fff;
            background: linear-gradient(90deg, rgba(255,255,255,0.18), transparent);
            font-weight: bold; transform: translateX(10px);
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        #controls {
            margin-top: 12px; display: flex;
            justify-content: center; gap: 8px;
            flex-wrap: wrap; pointer-events: auto; padding: 0 12px;
        }

        .tech-button {
            background: rgba(255,255,255,0.07); color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 999px; padding: 7px 18px;
            font-size: 0.78rem; font-family: 'Courier New', monospace;
            cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
        }

        .tech-button:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.6);
            transform: translateY(-2px);
        }

        .tech-button.active {
            background: rgba(0,255,255,0.2);
            border-color: #00ffff; color: #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        #start-camera {
            background: rgba(0,255,100,0.1);
            border-color: rgba(0,255,100,0.4); color: #00ff88;
        }
        #start-camera:hover { background: rgba(0,255,100,0.22); border-color: #00ff88; }

        #subtitle {
            font-size: 0.6rem; letter-spacing: 4px;
            color: rgba(255,255,255,0.2); margin-top: 8px;
        }

        #video-container {
            position: fixed; bottom: 2%; left: 50%;
            transform: translateX(-50%);
            width: min(80vw, 300px); height: min(36vh, 210px);
            border: 1px solid rgba(255,255,255,0.15);
            z-index: 2; background: #000;
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .input_video {
            width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1);
        }

        #output_canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; transform: scaleX(-1);
        }

        #camera-status {
            position: fixed;
            bottom: calc(2% + min(36vh, 210px) + 8px);
            left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: rgba(255,255,255,0.3);
            letter-spacing: 2px; z-index: 10;
            pointer-events: none; white-space: nowrap; transition: color 0.3s;
        }

        #grain {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

<div id="grain"></div>

<div id="ui">
    <h1>呪術廻戦</h1>
    <div id="technique-name">Cursed Techniques</div>
    <div id="instructions">
        <div id="instr-red"    class="instruction">✦ Reverse Cursed Technique: Red</div>
        <div id="instr-void"   class="instruction">✦ Domain Expansion: Infinite Void</div>
        <div id="instr-purple" class="instruction">✦ Secret Technique: Hollow Purple</div>
        <div id="instr-shrine" class="instruction">✦ Domain Expansion: Malevolent Shrine</div>
    </div>
    <div id="controls">
        <button class="tech-button active" data-tech="neutral">Neutral</button>
        <button class="tech-button" data-tech="red">Red</button>
        <button class="tech-button" data-tech="void">Void</button>
        <button class="tech-button" data-tech="purple">Purple</button>
        <button class="tech-button" data-tech="shrine">Shrine</button>
        <button id="start-camera" class="tech-button">📷 Start Camera</button>
    </div>
    <div id="subtitle">JUJUTSU KAISEN · CURSED ENERGY</div>
</div>

<div id="video-container">
    <video class="input_video" autoplay muted playsinline></video>
    <canvas id="output_canvas"></canvas>
</div>
<div id="camera-status">CAMERA INACTIVE</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ── Chromatic Aberration ──────────────────────────────────────────────────────
var AberrationShader = {
    uniforms: { tDiffuse: { value: null }, amount: { value: 0.005 } },
    vertexShader: 'varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader: 'uniform sampler2D tDiffuse;uniform float amount;varying vec2 vUv;void main(){float r=texture2D(tDiffuse,vUv+vec2(amount,0.0)).r;float g=texture2D(tDiffuse,vUv).g;float b=texture2D(tDiffuse,vUv-vec2(amount,0.0)).b;gl_FragColor=vec4(r,g,b,1.0);}'
};

// ── Scene ─────────────────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.008);

var camera3d = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera3d.position.set(0, 0, 60);

var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.domElement.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;';
document.body.appendChild(renderer.domElement);

// ── Post-processing ───────────────────────────────────────────────────────────
var composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera3d));

// Strong bloom
var bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    3.0,   // strength (was 1.5)
    0.6,   // radius
    0.1    // threshold (low = more things glow)
);
composer.addPass(bloomPass);

var aberrationPass = new THREE.ShaderPass(AberrationShader);
composer.addPass(aberrationPass);

// ── Particles ─────────────────────────────────────────────────────────────────
var COUNT = 35000; // more particles (was 20000)
var positions       = new Float32Array(COUNT * 3);
var colors          = new Float32Array(COUNT * 3);
var sizes           = new Float32Array(COUNT);
var targetPositions = new Float32Array(COUNT * 3);
var targetColors    = new Float32Array(COUNT * 3);
var targetSizes     = new Float32Array(COUNT);

for (var i = 0; i < COUNT; i++) {
    var ix = i * 3;
    positions[ix]   = (Math.random()-0.5)*120;
    positions[ix+1] = (Math.random()-0.5)*120;
    positions[ix+2] = (Math.random()-0.5)*120;
    colors[ix] = colors[ix+1] = colors[ix+2] = 0.05;
    sizes[i] = 0.5;
    targetPositions[ix]   = positions[ix];
    targetPositions[ix+1] = positions[ix+1];
    targetPositions[ix+2] = positions[ix+2];
    targetColors[ix] = targetColors[ix+1] = targetColors[ix+2] = 0.05;
    targetSizes[i] = 0.5;
}

var geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
geometry.setAttribute('size',     new THREE.BufferAttribute(sizes,     1));

function makeSprite() {
    var c = document.createElement('canvas'); c.width = c.height = 64;
    var ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(32,32,0,32,32,28);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.6)');
    g.addColorStop(0.7, 'rgba(255,255,255,0.1)');
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}

var mat = new THREE.PointsMaterial({
    size: 0.55,           // bigger (was 0.3)
    vertexColors: true,
    map: makeSprite(),
    blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false,
    sizeAttenuation: true, alphaTest: 0.01
});

var particles = new THREE.Points(geometry, mat);
scene.add(particles);

// ── Second inner glow layer (extra dense core) ────────────────────────────────
var COUNT2 = 8000;
var pos2 = new Float32Array(COUNT2*3), col2 = new Float32Array(COUNT2*3), siz2 = new Float32Array(COUNT2);
var tPos2 = new Float32Array(COUNT2*3), tCol2 = new Float32Array(COUNT2*3), tSiz2 = new Float32Array(COUNT2);
for (var i=0;i<COUNT2;i++){var ix=i*3;pos2[ix]=(Math.random()-0.5)*20;pos2[ix+1]=(Math.random()-0.5)*20;pos2[ix+2]=(Math.random()-0.5)*20;col2[ix]=col2[ix+1]=col2[ix+2]=0.05;siz2[i]=0.3;tPos2[ix]=pos2[ix];tPos2[ix+1]=pos2[ix+1];tPos2[ix+2]=pos2[ix+2];tCol2[ix]=tCol2[ix+1]=tCol2[ix+2]=0.05;tSiz2[i]=0.3;}
var geo2 = new THREE.BufferGeometry();
geo2.setAttribute('position',new THREE.BufferAttribute(pos2,3));
geo2.setAttribute('color',new THREE.BufferAttribute(col2,3));
geo2.setAttribute('size',new THREE.BufferAttribute(siz2,1));
var mat2 = new THREE.PointsMaterial({size:1.2,vertexColors:true,map:makeSprite(),blending:THREE.AdditiveBlending,transparent:true,depthWrite:false,sizeAttenuation:true,alphaTest:0.01});
var particles2 = new THREE.Points(geo2,mat2);
scene.add(particles2);

// ── Pattern Generators ────────────────────────────────────────────────────────
function getRed(i, total) {
    if (i < total*0.12) {
        var r=Math.random()*10+2, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
        return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:1,g:0.05,b:0.05,s:3.5};
    }
    var arm=i%3,t=i/total,angle=t*Math.PI*12+arm*(Math.PI*2/3),radius=4+t*45;
    return {x:radius*Math.cos(angle),y:radius*Math.sin(angle),z:(Math.random()-0.5)*8*t,r:1,g:0.08,b:0.08,s:1.5};
}
function getRed2(i, total) {
    var r=Math.random()*6, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:1,g:0.1,b:0.0,s:2.0};
}

function getVoid(i, total) {
    if (i < total*0.18) {
        var a=Math.random()*Math.PI*2, r=26+Math.random()*6;
        return {x:r*Math.cos(a),y:r*Math.sin(a),z:(Math.random()-0.5)*3,r:1,g:1,b:1,s:3.0};
    }
    var r=20+Math.random()*100, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:0.1,g:0.5,b:1.0,s:1.0};
}
function getVoid2(i, total) {
    var a=Math.random()*Math.PI*2, r=Math.random()*8;
    return {x:r*Math.cos(a),y:r*Math.sin(a),z:(Math.random()-0.5)*5,r:0.2,g:0.8,b:1.0,s:1.5};
}

function getPurple(i, total) {
    if (Math.random()>0.75) return {x:(Math.random()-0.5)*120,y:(Math.random()-0.5)*120,z:(Math.random()-0.5)*120,r:0.3,g:0.0,b:0.5,s:1.0};
    var r=22, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:0.8,g:0.0,b:1.0,s:3.0};
}
function getPurple2(i, total) {
    var r=Math.random()*10, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:0.9,g:0.2,b:1.0,s:2.5};
}

function getShrine(i, total) {
    if (i<total*0.3) return {x:(Math.random()-0.5)*90,y:-18,z:(Math.random()-0.5)*90,r:0.6,g:0,b:0,s:1.2};
    if (i<total*0.4) {var px=((i%4)<2?1:-1)*14,pz=((i%4)%2===0?1:-1)*9;return {x:px+(Math.random()-0.5)*5,y:-18+Math.random()*36,z:pz+(Math.random()-0.5)*5,r:0.3,g:0.3,b:0.3,s:0.8};}
    if (i<total*0.6) {var t=Math.random()*Math.PI*2,rad=Math.random()*35,cur=Math.pow(rad/35,2)*12;return {x:rad*Math.cos(t),y:18-cur+Math.random()*3,z:rad*Math.sin(t)*0.6,r:1.0,g:0.05,b:0.05,s:1.2};}
    return {x:(Math.random()-0.5)*60,y:(Math.random()-0.5)*60,z:(Math.random()-0.5)*60,r:0.3,g:0,b:0,s:0.6};
}
function getShrine2(i, total) {
    return {x:(Math.random()-0.5)*10,y:-5+Math.random()*10,z:(Math.random()-0.5)*10,r:1.0,g:0.2,b:0.0,s:2.0};
}

function getNeutral(i, total) {
    if (i<total*0.06){var r=12+Math.random()*30,th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI;return {x:r*Math.sin(ph)*Math.cos(th),y:r*Math.sin(ph)*Math.sin(th),z:r*Math.cos(ph),r:0.1,g:0.1,b:0.2,s:0.5};}
    return {x:(Math.random()-0.5)*15,y:(Math.random()-0.5)*15,z:(Math.random()-0.5)*15,r:0.04,g:0.04,b:0.08,s:0.25};
}
function getNeutral2(i, total) {
    return {x:(Math.random()-0.5)*5,y:(Math.random()-0.5)*5,z:(Math.random()-0.5)*5,r:0.05,g:0.05,b:0.1,s:0.2};
}

function getPattern(tech,i,total){ if(tech==='red') return getRed(i,total); if(tech==='void') return getVoid(i,total); if(tech==='purple') return getPurple(i,total); if(tech==='shrine') return getShrine(i,total); return getNeutral(i,total); }
function getPattern2(tech,i,total){ if(tech==='red') return getRed2(i,total); if(tech==='void') return getVoid2(i,total); if(tech==='purple') return getPurple2(i,total); if(tech==='shrine') return getShrine2(i,total); return getNeutral2(i,total); }

// ── State ─────────────────────────────────────────────────────────────────────
var currentTech='neutral', shakeIntensity=0, handX=0, handY=0, glowColor='#00ffff';

var uiTitle      = document.getElementById('technique-name');
var buttons      = document.querySelectorAll('.tech-button[data-tech]');
var startCamBtn  = document.getElementById('start-camera');
var videoEl      = document.querySelector('.input_video');
var canvasEl     = document.getElementById('output_canvas');
var canvasCtx    = canvasEl.getContext('2d');
var cameraStatus = document.getElementById('camera-status');

function generateTargets(tech) {
    for(var i=0;i<COUNT;i++){var ix=i*3,p=getPattern(tech,i,COUNT);targetPositions[ix]=p.x;targetPositions[ix+1]=p.y;targetPositions[ix+2]=p.z;targetColors[ix]=p.r;targetColors[ix+1]=p.g;targetColors[ix+2]=p.b;targetSizes[i]=p.s;}
    for(var i=0;i<COUNT2;i++){var ix=i*3,p=getPattern2(tech,i,COUNT2);tPos2[ix]=p.x;tPos2[ix+1]=p.y;tPos2[ix+2]=p.z;tCol2[ix]=p.r;tCol2[ix+1]=p.g;tCol2[ix+2]=p.b;tSiz2[i]=p.s;}
}

function markActive(tech) {
    document.querySelectorAll('.instruction').forEach(function(el){el.classList.remove('active-technique');});
    buttons.forEach(function(b){b.classList.toggle('active',b.dataset.tech===tech);});
    if(tech!=='neutral'){var el=document.getElementById('instr-'+tech);if(el)el.classList.add('active-technique');}
}

var techConfig = {
    neutral: {label:'Neutral State',              color:'#00ffff', bloom:2.0, glow:'#00ffff', shake:0},
    red:     {label:'Reverse Cursed Technique: Red',color:'#ff2200',bloom:5.0, glow:'#ff3300', shake:0.5},
    void:    {label:'Domain Expansion: Infinite Void',color:'#00eeff',bloom:4.0,glow:'#00ffff',shake:0.3},
    purple:  {label:'Secret Technique: Hollow Purple',color:'#cc00ff',bloom:6.0,glow:'#cc00ff',shake:0.6},
    shrine:  {label:'Domain Expansion: Malevolent Shrine',color:'#ff1100',bloom:5.0,glow:'#ff2200',shake:0.5}
};

function updateUI(tech) {
    var cfg=techConfig[tech]||techConfig.neutral;
    uiTitle.textContent=cfg.label;
    uiTitle.style.color=cfg.color;
    uiTitle.style.textShadow='0 0 20px '+cfg.color+', 0 0 40px '+cfg.color+'66';
    bloomPass.strength=cfg.bloom;
    glowColor=cfg.glow;
    shakeIntensity=cfg.shake;
    // Update active button glow color
    buttons.forEach(function(b){
        if(b.dataset.tech===tech){b.style.boxShadow='0 0 18px '+cfg.color+'66';}
        else{b.style.boxShadow='';}
    });
}

function activate(tech) {
    if(currentTech===tech)return;
    currentTech=tech;
    markActive(tech);
    updateUI(tech);
    generateTargets(tech);
}

generateTargets('neutral');
updateUI('neutral');
buttons.forEach(function(btn){btn.addEventListener('click',function(){activate(btn.dataset.tech);});});

// ── Camera & Hands ────────────────────────────────────────────────────────────
var mpHands=null, cameraFeed=null, handsReady=false;

function initHands() {
    if(handsReady)return; handsReady=true;
    mpHands=new Hands({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f;}});
    mpHands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.7});
    mpHands.onResults(function(results){
        canvasCtx.clearRect(0,0,canvasEl.width,canvasEl.height);
        var detected='neutral';
        if(results.multiHandLandmarks&&results.multiHandLandmarks.length>0){
            var lm=results.multiHandLandmarks[0];
            drawConnectors(canvasCtx,lm,HAND_CONNECTIONS,{color:glowColor,lineWidth:6});
            drawLandmarks(canvasCtx,lm,{color:'#ffffff',lineWidth:1,radius:3});
            handX=lm[9].x-0.5; handY=lm[9].y-0.5;
            var isUp=function(t,p){return lm[t].y<lm[p].y;};
            var pinch=Math.hypot(lm[8].x-lm[4].x,lm[8].y-lm[4].y);
            var cross=Math.hypot(lm[8].x-lm[12].x,lm[8].y-lm[12].y);
            var idx=isUp(8,6),mid=isUp(12,10),rng=isUp(16,14),pnk=isUp(20,18);
            if(pinch<0.05) detected='purple';
            else if(idx&&mid&&cross<0.08&&!rng) detected='void';
            else if(idx&&!mid&&!rng&&!pnk) detected='red';
            else if(idx&&mid&&rng&&pnk) detected='shrine';
        }
        activate(detected);
    });
}

startCamBtn.addEventListener('click',function(){
    startCamBtn.disabled=true; startCamBtn.textContent='⏳ Starting...';
    initHands();
    navigator.mediaDevices.getUserMedia({video:true})
    .then(function(stream){videoEl.srcObject=stream;return videoEl.play();})
    .then(function(){
        cameraFeed=new Camera(videoEl,{
            onFrame:function(){
                if(videoEl.readyState>=2){canvasEl.width=videoEl.videoWidth;canvasEl.height=videoEl.videoHeight;}
                return mpHands.send({image:videoEl});
            },
            width:640,height:480
        });
        return cameraFeed.start();
    })
    .then(function(){
        startCamBtn.style.display='none';
        cameraStatus.textContent='● CAMERA ACTIVE';
        cameraStatus.style.color='#00ff88';
    })
    .catch(function(err){
        console.error(err);
        startCamBtn.disabled=false;
        startCamBtn.textContent='📷 Start Camera';
        cameraStatus.textContent='✕ '+(err.message||'CAMERA FAILED');
        cameraStatus.style.color='#ff4444';
    });
});

window.addEventListener('resize',function(){
    camera3d.aspect=window.innerWidth/window.innerHeight;
    camera3d.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
    composer.setSize(window.innerWidth,window.innerHeight);
});

// ── Animation ─────────────────────────────────────────────────────────────────
var clock=new THREE.Clock();

function animate(){
    requestAnimationFrame(animate);
    var time=clock.getElapsedTime();

    // Aberration stronger during active techniques
    aberrationPass.uniforms.amount.value = (currentTech==='neutral'?0.002:0.008)+Math.random()*0.004;

    camera3d.rotation.x=handY*0.25;
    camera3d.rotation.y=-handX*0.25;

    if(shakeIntensity>0){
        var sx=(Math.random()-0.5)*shakeIntensity*28;
        var sy=(Math.random()-0.5)*shakeIntensity*28;
        renderer.domElement.style.transform='translate('+sx+'px,'+sy+'px)';
    } else {
        renderer.domElement.style.transform='none';
    }

    // Animate main particle layer
    var pos=geometry.attributes.position.array;
    var col=geometry.attributes.color.array;
    var siz=geometry.attributes.size.array;
    var slashTime=Math.floor(time*6);

    for(var i=0;i<COUNT;i++){
        var ix=i*3;
        pos[ix]+=(targetPositions[ix]-pos[ix])*0.06;
        pos[ix+1]+=(targetPositions[ix+1]-pos[ix+1])*0.06;
        pos[ix+2]+=(targetPositions[ix+2]-pos[ix+2])*0.06;
        col[ix]+=(targetColors[ix]-col[ix])*0.04;
        col[ix+1]+=(targetColors[ix+1]-col[ix+1])*0.04;
        col[ix+2]+=(targetColors[ix+2]-col[ix+2])*0.04;
        siz[i]+=(targetSizes[i]-siz[i])*0.04;

        if(currentTech==='purple'&&Math.random()>0.95){pos[ix]+=(Math.random()-0.5)*8;pos[ix+1]+=(Math.random()-0.5)*8;}
        if(currentTech==='shrine'&&i>COUNT*0.85&&i%20===slashTime%20){
            col[ix]=1.0;col[ix+1]=0.9;col[ix+2]=0.9;siz[i]=3.0;
            var off=(i%100)*0.5;pos[ix]=(Math.random()-0.5)*90+off;pos[ix+1]=(Math.random()-0.5)*60+off;
        }
        // Void: subtle pulsing expansion
        if(currentTech==='void'&&i%7===0){pos[ix+2]+=Math.sin(time*2+i*0.01)*0.08;}
    }
    geometry.attributes.position.needsUpdate=true;
    geometry.attributes.color.needsUpdate=true;
    geometry.attributes.size.needsUpdate=true;

    // Animate inner glow layer
    var p2=geo2.attributes.position.array;
    var c2=geo2.attributes.color.array;
    var s2=geo2.attributes.size.array;
    for(var i=0;i<COUNT2;i++){
        var ix=i*3;
        p2[ix]+=(tPos2[ix]-p2[ix])*0.07;
        p2[ix+1]+=(tPos2[ix+1]-p2[ix+1])*0.07;
        p2[ix+2]+=(tPos2[ix+2]-p2[ix+2])*0.07;
        c2[ix]+=(tCol2[ix]-c2[ix])*0.05;
        c2[ix+1]+=(tCol2[ix+1]-c2[ix+1])*0.05;
        c2[ix+2]+=(tCol2[ix+2]-c2[ix+2])*0.05;
        s2[i]+=(tSiz2[i]-s2[i])*0.05;
        // Pulsing size on inner layer
        if(currentTech!=='neutral') s2[i]*=1.0+Math.sin(time*4+i*0.5)*0.15;
    }
    geo2.attributes.position.needsUpdate=true;
    geo2.attributes.color.needsUpdate=true;
    geo2.attributes.size.needsUpdate=true;

    // Rotation per technique
    if(currentTech==='red'){
        particles.rotation.z-=0.018; particles.rotation.x=0; particles.rotation.y=0;
        particles2.rotation.z-=0.025;
    } else if(currentTech==='purple'){
        particles.rotation.z+=0.022; particles.rotation.x=Math.sin(time)*0.25; particles.rotation.y=Math.cos(time)*0.25;
        particles2.rotation.z+=0.03; particles2.rotation.x=Math.sin(time*1.3)*0.3;
    } else if(currentTech==='void'){
        particles.rotation.y+=0.004; particles.rotation.x=Math.sin(time*0.15)*0.06; particles.rotation.z=0;
        particles2.rotation.y+=0.008; particles2.rotation.z=Math.cos(time*0.2)*0.04;
    } else if(currentTech==='shrine'){
        particles.rotation.set(0,0,0); particles2.rotation.set(0,0,0);
    } else {
        particles.rotation.y+=0.004; particles2.rotation.y+=0.006;
    }

    composer.render();
}

animate();
</script>
